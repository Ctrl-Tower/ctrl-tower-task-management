services:
  db:
    image: postgres:16-alpine
    container_name: taskboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskboard
      POSTGRES_PASSWORD: taskboard
      POSTGRES_DB: taskboard
    ports:
      - "5433:5432"
    volumes:
      - taskboard-pgdata:/var/lib/postgresql/data

volumes:
  taskboard-pgdata:
